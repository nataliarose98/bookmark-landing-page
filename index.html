<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Natalia">
  <title>Bookmark Landing Page</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- NAVBAR: fixed-top para que esté siempre arriba -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container-fluid">
      <!-- logo -->
      <a class="navbar-brand" href="#">
        <img src="images/logo-bookmark.svg" alt="Bookmark logo" width="120">
      </a>

      <!-- botón toggler (necesita bootstrap.bundle.js) -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" 
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="#features">Features</a></li>
          <li class="nav-item"><a class="nav-link" href="#pricing">Pricing</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>

        <a class="btn btn-secondary ms-lg-3" href="#">Login</a>
      </div>
    </div>
  </nav>

  <!-- MAIN: añadimos padding-top para que no lo tape el navbar fixed -->
  <main class="container" style="padding-top:80px;">
    <div class="row align-items-center">
      <!-- Texto: se apila en móvil y ocupa 6/12 en md -->
      <div class="col-12 col-md-6 order-2 order-md-1">
        <h1>A Simple Bookmark Manager</h1>
        <p>A clean and simple interface to organize your favourite websites. Open a new browser tab and see your sites load instantly. Try it for free.</p>
        <button class="btn btn-primary">Get it on Chrome</button>
        <button class="btn btn-secondary me-2">Get it on Firefox</button>
      </div>

      <!-- Imagen: responsive, aparece debajo en móvil por order -->
      <div class="col-12 col-md-6 order-1 order-md-2 text-center">
        <img src="images/illustration-hero.svg" class="img-fluid" alt="Ilustración de la app">
      </div>
    </div>
  </main>

  <footer class="text-center py-4">
    <p>© 2025 Bookmark. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JS local (cópialo desde node_modules) -->
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
